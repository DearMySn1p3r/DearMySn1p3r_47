<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excerpt Card Maker</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;700&family=Noto+Sans+KR:wght@200;300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Hahmlet:wght@200;300;400;500;700&display=swap">
<style>
@import url('https://cdn.jsdelivr.net/font-kopub/1.0/kopubbatang.css');

:root{
  --bg:#F4F2ED; --panel:#FFFFFF; --ink:#2C2823; --muted:#A79E93; --faint:#C9C0B4;
  --line:#ECE6DC; --field:#FAF8F4; --accent:#C77A5E; --accent-soft:rgba(199,122,94,0.10);
  --solid:#2C2823; --solid-text:#FBF8F3;
  --shadow:0 1px 2px rgba(44,40,35,.04), 0 12px 40px -12px rgba(44,40,35,.12);
}
body.dark{
  --bg:#16140F; --panel:#201D17; --ink:#EFE9DF; --muted:#8E867A; --faint:#5A5247;
  --line:#2E2A22; --field:#1A1712; --accent:#DD9276; --accent-soft:rgba(221,146,118,0.12);
  --solid:#EFE9DF; --solid-text:#16140F;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 16px 48px -16px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .35s,color .35s;min-height:100vh;}
.wrap{max-width:1180px;margin:0 auto;padding:38px 28px 80px;display:flex;flex-wrap:wrap;gap:36px;align-items:flex-start;}

.masthead{flex:1 1 100%;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:4px;}
.brand{display:flex;align-items:baseline;gap:11px;}
.brand .title{font-family:'Hahmlet',serif;font-size:1.55rem;font-weight:500;letter-spacing:-.01em;}
.brand .tag{font-size:.72rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
.theme-btn{border:1px solid var(--line);background:var(--panel);color:var(--muted);width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;padding:0;}
.theme-btn svg{display:block;}
.theme-btn:hover{color:var(--ink);border-color:var(--faint);}

.panel{flex:1 1 360px;min-width:0;max-width:430px;display:flex;flex-direction:column;gap:18px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);transition:background .35s,border-color .35s;}
.lbl{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.swatch{position:relative;aspect-ratio:1/1;border-radius:12px;cursor:pointer;border:none;padding:0;outline:2px solid transparent;outline-offset:2px;transition:outline-color .15s,transform .15s;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);}
.swatch:hover{transform:translateY(-2px);}
.swatch.on{outline-color:var(--accent);}
.swatch .nm{position:absolute;left:0;right:0;bottom:5px;font-size:.58rem;text-align:center;color:rgba(0,0,0,.5);font-weight:600;text-shadow:0 1px 2px rgba(255,255,255,.4);}
.swatch.lt .nm{color:rgba(255,255,255,.92);text-shadow:0 1px 3px rgba(0,0,0,.35);}

.cust{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:12px;}
.cust-head{display:flex;align-items:center;gap:8px;}
.cust-head .lab{font-size:.78rem;}
.mini-seg{display:flex;gap:5px;margin-left:auto;}
.mini-seg button{padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--muted);font-size:.72rem;cursor:pointer;}
.mini-seg button.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);font-weight:600;}
.cust-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.color-input{width:34px;height:34px;padding:0;border:1px solid var(--line);border-radius:9px;background:none;cursor:pointer;}
.color-input::-webkit-color-swatch-wrapper{padding:3px;}.color-input::-webkit-color-swatch{border:none;border-radius:6px;}
.hex{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums;}
.dirs{display:flex;gap:5px;}
.dirbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--muted);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.dirbtn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.chip{border:1px solid var(--line);background:var(--field);color:var(--muted);font-size:.7rem;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer;transition:.15s;}
.chip:hover{background:var(--solid);color:var(--solid-text);border-color:var(--solid);}
.saved-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;}
.sv{position:relative;aspect-ratio:1/1;border-radius:9px;cursor:pointer;border:none;outline:2px solid transparent;outline-offset:2px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
.sv.on{outline-color:var(--accent);}
.sv .x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--ink);color:var(--panel);border:none;font-size:10px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.fbtn{background:var(--field);border:1px solid var(--line);color:var(--muted);padding:12px 4px;border-radius:10px;cursor:pointer;font-size:.84rem;transition:.15s;font-weight:400;font-synthesis:none;}
.fbtn:hover{color:var(--ink);border-color:var(--faint);}
.fbtn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.f-gowun{font-family:'Gowun Batang',serif;}.f-serif{font-family:'Noto Serif KR',serif;}.f-hahmlet{font-family:'Hahmlet',serif;}
.f-myeongjo{font-family:'Nanum Myeongjo',serif;}.f-kopub{font-family:'KoPub Batang','KoPubBatang',serif;}
.f-pre{font-family:'Pretendard',sans-serif;}.f-noto{font-family:'Noto Sans KR',sans-serif;}.f-dodum{font-family:'Gowun Dodum',sans-serif;}

.seg{display:flex;gap:6px;}
.seg button{flex:1;background:var(--field);border:1px solid var(--line);color:var(--muted);padding:9px;border-radius:9px;cursor:pointer;font-size:.82rem;transition:.15s;}
.seg button:hover{color:var(--ink);border-color:var(--faint);}
.seg button.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);font-weight:600;}

.row{display:flex;justify-content:space-between;align-items:center;}
.row + .row{margin-top:13px;}
.row .name{font-size:.86rem;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--muted);font-size:1.1rem;line-height:1;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;}
.stepper button:hover{background:var(--solid);color:var(--solid-text);border-color:var(--solid);}
.val{min-width:54px;text-align:center;font-size:.86rem;font-weight:600;color:var(--accent);}
.val .u{font-size:.66rem;color:var(--muted);margin-left:1px;}

.split{display:flex;gap:14px;}.split>div{flex:1;}
.mini-lbl{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px;}

.editor,textarea,input[type=text]{width:100%;background:var(--field);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--ink);font-family:inherit;font-size:.94rem;transition:border-color .15s;}
.editor{min-height:90px;line-height:1.7;outline:none;font-synthesis:style weight;white-space:pre-wrap;word-break:keep-all;font-weight:300;}
.editor:focus,input:focus,textarea:focus{border-color:var(--accent);outline:none;}
.editor:empty:before{content:attr(data-ph);color:var(--faint);}
input::placeholder,textarea::placeholder{color:var(--faint);}
textarea.sub{min-height:48px;resize:vertical;line-height:1.5;}
.fld{margin-bottom:10px;}
.editor mark{color:inherit;border-radius:3px;padding:0 .02em;}
#quoteText mark{color:inherit;background:transparent!important;padding:0;}
#quoteText b,#quoteText strong,.editor b,.editor strong{font-weight:800;}
#quoteText i,#quoteText em,.editor i,.editor em{font-style:italic;}
.hlrect{position:absolute;border-radius:3px;pointer-events:none;}
.editor *{font-size:inherit!important;font-family:inherit!important;line-height:inherit!important;}
#quoteText *{font-size:inherit!important;font-family:inherit!important;line-height:inherit!important;}

.hl-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:12px 0 4px;}
.hl-bar .cap{font-size:.72rem;color:var(--muted);margin-right:2px;}
.hsw{width:24px;height:24px;border-radius:7px;border:1px solid rgba(0,0,0,.08);cursor:pointer;background:var(--c);transition:transform .12s;padding:0;}
.hsw:hover{transform:scale(1.12);}
.hl-custom{width:24px;height:24px;border-radius:7px;border:1px dashed var(--faint);background:conic-gradient(from 0deg,#f8c8d8,#fceba8,#c6e8ae,#c7e0f4,#e7ccf5,#f8c8d8);cursor:pointer;position:relative;overflow:hidden;}
.hl-custom input{position:absolute;inset:-4px;opacity:0;cursor:pointer;}
.hl-erase{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--field);color:var(--muted);cursor:pointer;font-size:.78rem;display:flex;align-items:center;justify-content:center;}
.hl-erase:hover{background:var(--solid);color:var(--solid-text);}
.emph{width:30px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--ink);cursor:pointer;font-size:.92rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.emph:hover{border-color:var(--accent);color:var(--accent);}
.emph:active{background:var(--accent-soft);}
.hsv{position:relative;width:24px;height:24px;border-radius:7px;border:1px solid rgba(0,0,0,.08);cursor:pointer;}
.hsv .x{position:absolute;top:-6px;right:-6px;width:15px;height:15px;border-radius:50%;background:var(--ink);color:var(--panel);border:none;font-size:9px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hint-sm{font-size:.7rem;color:var(--muted);line-height:1.5;margin-top:2px;}

.attr{display:flex;gap:10px;margin-top:14px;}.attr input:first-child{flex:1;}.attr input:last-child{flex:1.3;}

.actions{display:flex;gap:10px;}
.btn{padding:15px 10px;border-radius:13px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.18s;font-family:inherit;}
.btn-copy{flex:1;background:var(--field);color:var(--ink);border:1px solid var(--line);}
.btn-copy:hover{border-color:var(--faint);}
.btn-save{flex:1.6;background:var(--solid);color:var(--solid-text);border:none;}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 22px -8px rgba(44,40,35,.45);}
.btn:disabled{opacity:.6;cursor:default;transform:none;}

.preview{flex:1 1 380px;min-width:0;max-width:560px;position:sticky;top:38px;display:flex;flex-direction:column;gap:14px;}
.canvas-wrap{width:100%;aspect-ratio:1/1;position:relative;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px -20px rgba(44,40,35,.35);}
#canvas{width:1080px;height:1080px;position:absolute;top:0;left:0;transform-origin:top left;display:flex;align-items:center;justify-content:center;padding:110px 84px;box-sizing:border-box;background:#F2F0EA;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
#canvas .veil{position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 50% 0%,rgba(255,255,255,.07),transparent 60%);}
#stage{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;}
#heading,#subtitle,#attr{-webkit-user-select:none;user-select:none;}
#heading{font-weight:600;letter-spacing:.005em;font-synthesis:none;line-height:1.3;}
#subtitle{opacity:.55;font-synthesis:none;line-height:1.35;font-weight:300;}
#quote{position:relative;font-family:'Pretendard',sans-serif;font-size:34px;line-height:1.72;letter-spacing:0;color:#2C2823;text-align:left;word-break:keep-all;white-space:pre-wrap;font-weight:300;font-synthesis:style weight;}
#hlLayer{position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;}
#quoteText{position:relative;z-index:1;white-space:pre-wrap;word-break:inherit;-webkit-user-select:text;user-select:text;cursor:text;}
#quoteText:empty:before{content:'입력한 문구가 여기에 표시됩니다';opacity:.3;}
#attr{font-size:21px;letter-spacing:.04em;color:#2C2823;opacity:.7;text-align:left;font-synthesis:none;font-weight:300;}
#attr .sep{margin:0 .5em;opacity:.5;}#attr .dash{opacity:.7;}

@media(max-width:880px){.wrap{padding:24px 16px 60px;gap:24px;}.preview{position:relative;top:0;order:-1;}.panel{max-width:none;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="brand"><span class="title">Excerpt</span><span class="tag">Card Maker</span></div>
    <button class="theme-btn" id="themeBtn" onclick="toggleDark()" title="화면 테마 전환"></button>
  </header>

  <section class="panel">

    <div class="card">
      <div class="lbl">이미지 크기</div>
      <div class="seg" id="segSize" style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
        <button class="on" onclick="setSize('square',this)">정사각형<br><span style="font-size:.62rem;opacity:.6;">1080×1080</span></button>
        <button onclick="setSize('portrait',this)">세로형<br><span style="font-size:.62rem;opacity:.6;">1080×1350</span></button>
        <button onclick="setSize('landscape',this)">가로형<br><span style="font-size:.62rem;opacity:.6;">1350×1000</span></button>
        <button onclick="setSize('twitter',this)">트위터 헤더<br><span style="font-size:.62rem;opacity:.6;">1500×500</span></button>
      </div>
    </div>

    <div class="card">
      <div class="lbl">배경</div>
      <div class="swatches" id="swatches"></div>
      <div class="cust">
        <div class="cust-head">
          <span class="lab">색 직접 지정</span>
          <div class="mini-seg">
            <button id="cmSolid" class="on" onclick="setCustomMode('solid')">단색</button>
            <button id="cmGrad" onclick="setCustomMode('grad')">그라데이션</button>
            <button id="cmImg" onclick="document.getElementById('bgImgInput').click()">이미지</button>
          </div>
        </div>
        <input type="file" id="bgImgInput" accept="image/*" style="display:none;" onchange="onBgImage(this)">
        <div id="imgRow" style="display:none;" class="cust-line">
          <span class="hex" id="imgName">이미지 배경 적용됨</span>
          <button class="chip" onclick="saveBg()">＋ 저장</button>
          <button class="chip" onclick="setPreset('paper')">제거</button>
        </div>
        <div class="cust-line" id="solidWrap">
          <input type="color" class="color-input" id="bgC1" value="#F2F0EA" oninput="updateCustom(true)">
          <span class="hex" id="bgHex">#F2F0EA</span>
          <button class="chip" style="margin-left:auto;" onclick="saveBg()">＋ 저장</button>
        </div>
        <div class="cust-line" id="gradWrap" style="display:none;">
          <input type="color" class="color-input" id="bgGa" value="#FBE4D6" oninput="updateCustom(true)">
          <input type="color" class="color-input" id="bgGb" value="#E7CCF5" oninput="updateCustom(true)">
          <div class="dirs">
            <button class="dirbtn on" onclick="setDir('180deg',this)" title="아래로">↓</button>
            <button class="dirbtn" onclick="setDir('145deg',this)" title="대각선">↘</button>
            <button class="dirbtn" onclick="setDir('90deg',this)" title="오른쪽">→</button>
            <button class="dirbtn" onclick="setDir('radial',this)" title="원형">◉</button>
          </div>
          <button class="chip" style="margin-left:auto;" onclick="saveBg()">＋ 저장</button>
        </div>
        <div id="myBgWrap" style="display:none;">
          <div class="mini-lbl" style="margin-bottom:8px;">내 색 · 다음에도 사용</div>
          <div class="saved-grid" id="myBgGrid"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="split">
        <div><div class="mini-lbl">글자색</div>
          <div class="seg" id="segColor"><button onclick="setColor('dark',this)">어둡게</button><button onclick="setColor('light',this)">밝게</button></div></div>
        <div><div class="mini-lbl">세로 위치</div>
          <div class="seg" id="segValign"><button class="on" onclick="setValign('center',this)">가운데</button><button onclick="setValign('top',this)">위쪽</button><button onclick="setValign('bottom',this)">아래쪽</button></div></div>
      </div>
      <div style="margin-top:14px;">
        <div class="mini-lbl">정렬</div>
        <div class="seg" id="segAlign"><button class="on" onclick="setAlign('left',this)">왼쪽</button><button onclick="setAlign('center',this)">가운데</button><button onclick="setAlign('right',this)">오른쪽</button></div>
      </div>
    </div>

    <div class="card">
      <div class="lbl">서체</div>
      <div class="fgrid" id="fonts">
        <button class="fbtn f-pre on" data-f="'Pretendard',sans-serif">프리텐다드</button>
        <button class="fbtn f-gowun" data-f="'Gowun Batang',serif">고운바탕</button>
        <button class="fbtn f-hahmlet" data-f="'Hahmlet',serif">함렛 명조</button>
        <button class="fbtn f-myeongjo" data-f="'Nanum Myeongjo',serif">나눔명조</button>
        <button class="fbtn f-serif" data-f="'Noto Serif KR',serif">노토 명조</button>
        <button class="fbtn f-kopub" data-f="'KoPub Batang','KoPubBatang',serif">코펍바탕</button>
        <button class="fbtn f-dodum" data-f="'Gowun Dodum',sans-serif">고운돋움</button>
        <button class="fbtn f-noto" data-f="'Noto Sans KR',sans-serif">노토 고딕</button>
      </div>
    </div>

    <div class="card">
      <div class="lbl" style="margin-bottom:16px;">
        세부 조정
        <div style="display:flex;gap:4px;">
          <button class="seg-wrap on" style="padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--muted);font-size:.72rem;cursor:pointer;" onclick="setWrap('keep-all',this)">단어</button>
          <button class="seg-wrap" style="padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--field);color:var(--muted);font-size:.72rem;cursor:pointer;" onclick="setWrap('break-all',this)">글자</button>
        </div>
      </div>
      <div class="row"><span class="name">글자 크기</span><div class="stepper"><button onclick="adjust('fontSize',-1)">−</button><span class="val" id="v-fontSize">34<span class="u">px</span></span><button onclick="adjust('fontSize',1)">+</button></div></div>
      <div class="row"><span class="name">줄 간격</span><div class="stepper"><button onclick="adjust('lineHeight',-0.05)">−</button><span class="val" id="v-lineHeight">1.72<span class="u">x</span></span><button onclick="adjust('lineHeight',0.05)">+</button></div></div>
      <div class="row"><span class="name">자간</span><div class="stepper"><button onclick="adjust('letterSpacing',-0.2)">−</button><span class="val" id="v-letterSpacing">0.0<span class="u">px</span></span><button onclick="adjust('letterSpacing',0.2)">+</button></div></div>
      <div class="row"><span class="name">가로 여백</span><div class="stepper"><button onclick="adjust('padX',-8)">−</button><span class="val" id="v-padX">84<span class="u">px</span></span><button onclick="adjust('padX',8)">+</button></div></div>
      <div class="row"><span class="name">세로 여백</span><div class="stepper"><button onclick="adjust('padY',-8)">−</button><span class="val" id="v-padY">110<span class="u">px</span></span><button onclick="adjust('padY',8)">+</button></div></div>
    </div>

    <div class="card">
      <div class="lbl">제목 · 부제 <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint);">선택</span></div>
      <div class="fld"><input type="text" id="inHead" oninput="render()" placeholder="제목"></div>
      <textarea class="sub" id="inSub" oninput="render()" placeholder="부제"></textarea>
    </div>

    <div class="card">
      <div class="lbl">본문 <button class="chip" onclick="toggleQuotes()">&quot; &quot;  ⇄  &ldquo; &rdquo;</button></div>
      <div class="editor" id="editor" contenteditable="true" data-ph="여기에 발췌 문구를 입력하세요."></div>
      <div class="hl-bar">
        <span class="cap">형광펜</span>
        <button class="hsw" style="--c:#F8C8D8" data-c="#F8C8D8" title="핑크"></button>

<script>
const PRESETS=[
  {id:'paper', nm:'종이',     css:'#F2F0EA', color:'dark'},
  {id:'cream', nm:'크림',     css:'linear-gradient(160deg,#FBF1DF,#F2E1C4)', color:'dark'},
  {id:'sage',  nm:'세이지',   css:'linear-gradient(160deg,#DCE7CD,#B6CDA1)', color:'dark'},
  {id:'lilac', nm:'라일락',   css:'linear-gradient(160deg,#E7CCF5,#C6B7FF 62%,#B7C2FF)', color:'dark'},
  {id:'ocean', nm:'오션',     css:'linear-gradient(160deg,#A9D8E6,#C7E4E6 55%,#E5F1F0)', color:'dark'},
  {id:'mist',  nm:'미스트',   css:'linear-gradient(160deg,#EDEBE6,#D9D6CE)', color:'dark'},
  {id:'dusk',  nm:'트와일라잇',css:'linear-gradient(165deg,#586BB0,#8E7CC3 55%,#CF9BC0)', color:'light'},
  {id:'ink',   nm:'잉크',     css:'radial-gradient(120% 100% at 50% 0%,#34323A,#121116)', color:'light'},
];

const state={mode:'preset',presetId:'paper',savedIdx:-1,bgCss:'#F2F0EA',color:'dark',colorLocked:false,font:"'Pretendard',sans-serif",align:'left',valign:'center',wrap:'keep-all',fontSize:34,lineHeight:1.72,letterSpacing:0,padX:84,padY:110,customMode:'solid',dir:'180deg',weight:300,italic:false,sizeId:'square'};

const ICON_MOON='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
const ICON_SUN='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.2M12 19.8V22M4.2 4.2l1.5 1.5M18.3 18.3l1.5 1.5M2 12h2.2M19.8 12H22M4.2 19.8l1.5-1.5M18.3 5.7l1.5-1.5"/></svg>';
const LS_BG='excerpt.bg.v1', LS_HL='excerpt.hl.v1', LS_SET='excerpt.settings.v1';
function loadLS(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return [];}}

let myBg=loadLS(LS_BG), myHl=loadLS(LS_HL);
let settingsReady=false;
const SET_KEYS=['font','fontSize','lineHeight','letterSpacing','padX','padY','align','valign','wrap','color','colorLocked','mode','presetId','bgCss','customMode','dir','sizeId'];
function saveSettings(){if(!settingsReady)return;clearTimeout(saveSettings._t);saveSettings._t=setTimeout(()=>{const o={};SET_KEYS.forEach(k=>o[k]=state[k]);saveLS(LS_SET,o);},250);}
function loadSettings(){let o;try{o=JSON.parse(localStorage.getItem(LS_SET));}catch(e){o=null;}if(o&&typeof o==='object'){SET_KEYS.forEach(k=>{if(o[k]!==undefined)state[k]=o[k];});}try{if(!localStorage.getItem('excerpt.lhfix.v3')){if(state.lineHeight>1.8)state.lineHeight=1.72;localStorage.setItem('excerpt.lhfix.v3','1');}}catch(_){}settingsReady=true;}
function setVal(key){const el=document.getElementById('v-'+key);if(!el)return;const v=state[key];const u=key==='lineHeight'?'x':'px';const disp=key==='letterSpacing'?(+v).toFixed(1):(key==='lineHeight'?(+v).toFixed(2):v);el.innerHTML=disp+'<span class="u">'+u+'</span>';}
function restoreUI(){
  // 이미지 크기 복원

function buildSwatches(){
  const box=document.getElementById('swatches');box.innerHTML='';
  PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='swatch'+(p.color==='light'?' lt':'')+((state.mode==='preset'&&p.id===state.presetId)?' on':'');
    b.style.background=p.css;b.innerHTML='<span class="nm">'+p.nm+'</span>';
    b.onclick=()=>setPreset(p.id);box.appendChild(b);

function setPreset(id){const p=PRESETS.find(x=>x.id===id);state.mode='preset';state.presetId=id;state.bgCss=p.css;state.color=p.color;state.colorLocked=false;syncColorSeg();buildSwatches();renderMyBg();applyTheme();}

function autoText(hex){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)/255>0.62?'dark':'light';}
function avgHex(a,b){a=a.replace('#','');b=b.replace('#','');const f=(s,i)=>parseInt(s.substr(i,2),16);const m=i=>Math.round((f(a,i)+f(b,i))/2).toString(16).padStart(2,'0');return '#'+m(0)+m(2)+m(4);}
function buildCustom(){
  if(state.customMode==='solid'){const v=document.getElementById('bgC1').value;return {css:v,base:v};}
  const a=document.getElementById('bgGa').value,b=document.getElementById('bgGb').value;
  const css=state.dir==='radial'?'radial-gradient(circle at 50% 30%, '+a+', '+b+')':'linear-gradient('+state.dir+', '+a+', '+b+')';
  return {css,base:avgHex(a,b)};
}
function setCustomMode(m){state.customMode=m;document.getElementById('cmSolid').classList.toggle('on',m==='solid');document.getElementById('cmGrad').classList.toggle('on',m==='grad');document.getElementById('solidWrap').style.display=m==='solid'?'flex':'none';document.getElementById('gradWrap').style.display=m==='grad'?'flex':'none';updateCustom(true);}
function setDir(d,btn){state.dir=d;document.querySelectorAll('.dirbtn').forEach(x=>x.classList.remove('on'));btn.classList.add('on');updateCustom(false);}
function updateCustom(recolor){
  const r=buildCustom();
  if(state.customMode==='solid')document.getElementById('bgHex').textContent=document.getElementById('bgC1').value.toUpperCase();
  state.mode='custom';state.presetId=null;state.savedIdx=-1;state.bgCss=r.css;
  if(recolor && !state.colorLocked){state.color=autoText(r.base);syncColorSeg();}
  buildSwatches();renderMyBg();applyTheme();
}
function saveBg(){
  let item;
  if(/url\(/.test(state.bgCss)) item={css:state.bgCss,color:state.color};
  else { const r=buildCustom(); item={css:r.css,color:state.colorLocked?state.color:autoText(r.base)}; }
  myBg.unshift(item);if(myBg.length>18)myBg.pop();saveLS(LS_BG,myBg);renderMyBg();
}
function onBgImage(input){
  const file=input.files&&input.files[0];if(!file)return;
  const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{
    URL.revokeObjectURL(url);
    const max=1280;let w=img.width,h=img.height;
    if(Math.max(w,h)>max){const r=max/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
    let lum=0.5;try{const d=ctx.getImageData(0,0,w,h).data;let s=0,t=0;for(let i=0;i<d.length;i+=200){s+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];t++;}lum=s/t/255;}catch(_){}
    let dataURL;try{dataURL=cv.toDataURL('image/jpeg',0.82);}catch(_){alert('이미지를 사용할 수 없어요.');return;}
    state.mode='custom';state.presetId=null;state.savedIdx=-1;
    state.bgCss='url("'+dataURL+'") center/cover no-repeat';
    state.color=lum>0.6?'dark':'light';state.colorLocked=false;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
    syncColorSeg();buildSwatches();renderMyBg();applyTheme();
  };
  img.onerror=()=>{URL.revokeObjectURL(url);alert('이미지를 불러오지 못했어요.');};
  img.src=url;input.value='';
}
function renderMyBg(){
  const wrap=document.getElementById('myBgWrap'),grid=document.getElementById('myBgGrid');
  grid.innerHTML='';wrap.style.display=myBg.length?'block':'none';
  myBg.forEach((it,i)=>{
    const b=document.createElement('button');b.className='sv'+((state.mode==='saved'&&state.savedIdx===i)?' on':'');b.style.background=it.css;
    b.onclick=()=>{state.mode='saved';state.savedIdx=i;state.presetId=null;state.bgCss=it.css;state.color=it.color;state.colorLocked=false;syncColorSeg();buildSwatches();renderMyBg();applyTheme();};
    const x=document.createElement('button');x.className='x';x.textContent='×';x.onclick=(e)=>{e.stopPropagation();myBg.splice(i,1);saveLS(LS_BG,myBg);renderMyBg();};
    b.appendChild(x);grid.appendChild(b);
  });
}

function setColor(c,btn){state.color=c;state.colorLocked=true;document.querySelectorAll('#segColor button').forEach(x=>x.classList.remove('on'));btn.classList.add('on');applyTheme();}
function syncColorSeg(){const b=document.querySelectorAll('#segColor button');b.forEach(x=>x.classList.remove('on'));b[state.color==='dark'?0:1].classList.add('on');}

  saveSettings();
}

document.querySelectorAll('#fonts .fbtn').forEach(btn=>{btn.onclick=()=>{state.font=btn.dataset.f;document.querySelectorAll('#fonts .fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyStyle();};});
function setAlign(v,btn){state.align=v;document.querySelectorAll('#segAlign button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyStyle();}
function setValign(v,btn){state.valign=v;document.querySelectorAll('#segValign button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');applyStyle();}
function setWrap(v,btn){state.wrap=v;document.querySelectorAll('.seg-wrap').forEach(b=>{b.classList.remove('on');b.style.color='var(--muted)';b.style.borderColor='var(--line)';b.style.background='var(--field)';});btn.classList.add('on');btn.style.color='var(--accent)';btn.style.borderColor='var(--accent)';btn.style.background='var(--accent-soft)';applyStyle();}
function adjust(key,d){
  let v=+(state[key]+d).toFixed(2);const min={fontSize:12,lineHeight:1,letterSpacing:-5,padX:24,padY:24};
  if(v<min[key])v=min[key];state[key]=v;

function applyStyle(){
  const q=document.getElementById('quote'),a=document.getElementById('attr'),hd=document.getElementById('heading'),sb=document.getElementById('subtitle'),tb=document.getElementById('titleblock'),cv=document.getElementById('canvas');

const quoteTextEl=document.getElementById('quoteText');
const hlLayerEl=document.getElementById('hlLayer');
function sync(){quoteTextEl.innerHTML=editor.innerHTML;renderHL();}
/* 형광펜 오버레이: 미리보기 텍스트의 mark 위치를 계산해, 글자 높이만큼의 사각형을 글자 뒤에 그린다.
   (줄 간격과 무관하게 높이 고정 + 저장에서도 정확) */
function markBands(m,base,scale,fs){
  const rects=[];const cr=m.getClientRects();
  for(let i=0;i<cr.length;i++){if(cr[i].width>=1)rects.push(cr[i]);}
  const lines=[];
  rects.forEach(rc=>{
    const top=(rc.top-base.top)/scale,h=rc.height/scale,left=(rc.left-base.left)/scale,w=rc.width/scale;
    const cy=top+h/2;
    let g=null;for(let j=0;j<lines.length;j++){if(Math.abs(lines[j].cy-cy)<h*0.6){g=lines[j];break;}}
    if(g){g.left=Math.min(g.left,left);g.right=Math.max(g.right,left+w);g.top=Math.min(g.top,top);g.bottom=Math.max(g.bottom,top+h);}
    else lines.push({cy:cy,left:left,right:left+w,top:top,bottom:top+h});
  });
  return lines.map(L=>{
    const h=L.bottom-L.top;const bandH=Math.min(fs*1.16,h*0.84);
    return {left:L.left,top:L.top+(h-bandH)/2,width:L.right-L.left,height:bandH};
  });
}
function renderHL(){
  if(!hlLayerEl||!quoteTextEl)return;
  hlLayerEl.innerHTML='';
  const marks=quoteTextEl.querySelectorAll('mark');
  if(!marks.length)return;
  const canvas=document.getElementById('canvas');
  const scale=(canvas.getBoundingClientRect().width||curSize().w)/curSize().w;
  const base=quoteTextEl.getBoundingClientRect();
  const fs=state.fontSize;
  marks.forEach(m=>{
    const color=m.getAttribute('data-c')||m.style.backgroundColor||'#FBDDE6';
    markBands(m,base,scale,fs).forEach(B=>{
      const d=document.createElement('div');d.className='hlrect';
      d.style.left=B.left+'px';d.style.top=B.top+'px';d.style.width=B.width+'px';d.style.height=B.height+'px';d.style.background=color;
      hlLayerEl.appendChild(d);
    });
  });
}
function render(){
  sync();
  const hd=document.getElementById('inHead').value.trim();
  const sbRaw=document.getElementById('inSub').value;
  const heading=document.getElementById('heading'),subtitle=document.getElementById('subtitle'),tb=document.getElementById('titleblock');
  heading.textContent=hd;heading.style.display=hd?'block':'none';
  const hasSub=sbRaw.trim()!=='';
  subtitle.innerHTML=hasSub?sbRaw.split('\n').map(esc).join('<br>'):'';
  subtitle.style.display=hasSub?'block':'none';
  heading.style.marginBottom=(hd&&hasSub)?'0.22em':'0';
  tb.style.display=(hd||hasSub)?'block':'none';
  const src=document.getElementById('inSrc').value.trim(),spk=document.getElementById('inSpk').value.trim();
  const attr=document.getElementById('attr');
  if(src||spk){let h='<span class="dash">— </span>';if(src)h+=esc(src);if(src&&spk)h+='<span class="sep">|</span>';if(spk)h+=esc(spk);attr.innerHTML=h;attr.style.display='block';}
  else{attr.innerHTML='';attr.style.display='none';}
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

editor.addEventListener('input',()=>{sanitizeEditor();sync();});
editor.addEventListener('paste',e=>{e.preventDefault();const t=(e.clipboardData||window.clipboardData).getData('text/plain');document.execCommand('insertText',false,t);});

/* 본문 정리 — 삭제/붙여넣기로 끼어드는 빈 형광펜·인라인 스타일 제거(글씨 작아짐·공백 버그 방지). 필요할 때만 실행해 커서 유지 */
let _sanitizing=false;
function caretAt(pos){
  let p=0,node=null,off=0;
  (function walk(n){ if(node)return;
    if(n.nodeType===3){const len=n.nodeValue.length;if(pos<=p+len){node=n;off=pos-p;return;}p+=len;}
    else {const k=n.childNodes;for(let i=0;i<k.length;i++){walk(k[i]);if(node)return;}}
  })(editor);
  if(!node){node=editor;off=editor.childNodes.length;}
  try{const r=document.createRange();r.setStart(node,off);r.collapse(true);return r;}catch(_){return null;}
}
function sanitizeEditor(){
  if(_sanitizing)return;
  let need=false;
  editor.querySelectorAll('*').forEach(el=>{
    if(el.tagName==='MARK'){ if(!el.textContent)need=true; if(el.getAttribute('class')||/font-size|font-family/i.test(el.getAttribute('style')||''))need=true; }
    else if(el.tagName!=='BR'){ if(el.getAttribute('style')||el.getAttribute('class')||['SPAN','FONT','U','DIV','P'].indexOf(el.tagName)>=0)need=true; }
  });
  if(!need)return;
  _sanitizing=true;
  const s=getSelection();let caret=null;
  if(s&&s.rangeCount&&editor.contains(s.anchorNode))caret=offsetOf(editor,s.anchorNode,s.anchorOffset);
  // 마크 정리: 클래스만 제거, 배경(형광펜 색)은 유지. 빈 마크는 제거
  editor.querySelectorAll('mark').forEach(m=>{m.removeAttribute('class');if(!m.textContent)unwrapMark(m);});
  // 마크 외 인라인 래퍼: span/font/u만 풀고, 굵게/기울임(b,i,strong,em)은 보존
  editor.querySelectorAll('span,font,u').forEach(el=>{const p=el.parentNode;if(!p)return;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);});
  editor.querySelectorAll('div,p').forEach(el=>{const p=el.parentNode;if(!p)return;p.insertBefore(document.createElement('br'),el);while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);});
  editor.normalize&&editor.normalize();
  if(caret!=null){const r=caretAt(caret);if(r){try{s.removeAllRanges();s.addRange(r);}catch(_){}}}
  _sanitizing=false;
}

/* 형광펜 — 선택을 '문자 위치(offset)'로 저장해 두고, 칠할 때 그 위치로 범위를 새로 만들어 적용한다.
   (선택 객체가 사라져도 복원되므로 모바일/웹뷰에서도 동작) */
let selA=-1, selB=-1;
function textLen(n){if(!n)return 0;if(n.nodeType===3)return n.nodeValue.length;let t=0;n.childNodes&&n.childNodes.forEach(c=>t+=textLen(c));return t;}
function offsetOf(root,node,off){
  let total=0,found=false;
  (function walk(n){
    if(found)return;
    if(n.nodeType===3){ if(n===node){total+=off;found=true;return;} total+=n.nodeValue.length; }
    else { if(n===node){ for(let i=0;i<off;i++) total+=textLen(n.childNodes[i]); found=true; return; }
      const kids=n.childNodes; for(let i=0;i<kids.length;i++){ walk(kids[i]); if(found)return; } }
  })(root);
  return found?total:null;
}
function rangeFromOffsets(a,b){
  let pos=0,sN=null,sO=0,eN=null,eO=0;
  (function walk(n){
    if(n.nodeType===3){ const len=n.nodeValue.length;
      if(sN==null && a<=pos+len){sN=n;sO=a-pos;}
      if(eN==null && b<=pos+len){eN=n;eO=b-pos;}
      pos+=len;
    } else { const k=n.childNodes; for(let i=0;i<k.length;i++) walk(k[i]); }
  })(editor);
  if(!sN||!eN)return null;
  try{const r=document.createRange();r.setStart(sN,sO);r.setEnd(eN,eO);return r.collapsed?null:r;}catch(_){return null;}
}
const quoteEl=document.getElementById('quote');
function captureOffsets(){
  const s=getSelection();
  if(!s||!s.rangeCount)return;
  const r=s.getRangeAt(0);
  if(r.collapsed)return;
  // 본문(에디터) 또는 미리보기 텍스트 어느 쪽 선택이든 받는다 — 둘은 동일한 텍스트라 위치가 같다
  let root=null;
  if(r.commonAncestorContainer===editor||editor.contains(r.commonAncestorContainer)) root=editor;
  else if(r.commonAncestorContainer===quoteTextEl||quoteTextEl.contains(r.commonAncestorContainer)) root=quoteTextEl;
  if(!root)return;
  const a=offsetOf(root,r.startContainer,r.startOffset), b=offsetOf(root,r.endContainer,r.endOffset);
  if(a==null||b==null||a===b)return;
  selA=Math.min(a,b); selB=Math.max(a,b);
}
document.addEventListener('selectionchange',captureOffsets);
['mouseup','keyup','touchend','pointerup','select','input'].forEach(ev=>{editor.addEventListener(ev,captureOffsets);quoteTextEl.addEventListener(ev,captureOffsets);});
function getRange(){
  const s=getSelection();
  if(s&&s.rangeCount){const r=s.getRangeAt(0);if(!r.collapsed&&(editor.contains(r.startContainer)||editor.contains(r.endContainer)||r.commonAncestorContainer===editor))return r;}
  if(selA>=0&&selB>selA){const r=rangeFromOffsets(selA,selB);if(r)return r;}
  return null;
}
function flashHint(){
  const h=document.getElementById('hlHint');if(!h)return;
  const prev=h.dataset.base||h.textContent;h.dataset.base=prev;
  h.textContent='칠할 글자를 먼저 드래그해 선택하세요(본문 칸 또는 오른쪽 미리보기).';
  h.style.color='var(--accent)';h.style.fontWeight='700';
  clearTimeout(flashHint._t);flashHint._t=setTimeout(()=>{h.style.color='';h.style.fontWeight='';h.textContent=prev;},2200);
}
function applyHL(color){
  const range=getRange();
  if(!range){flashHint();return;}
  const m=document.createElement('mark');m.setAttribute('data-c',color);m.style.backgroundColor=color;
  try{range.surroundContents(m);}
  catch(e){try{const frag=range.extractContents();m.appendChild(frag);range.insertNode(m);}catch(_){return;}}
  selA=selB=-1;
  try{getSelection().removeAllRanges();}catch(_){}
  sync();
}
function clearHL(){
  const range=getRange();
  if(!range){flashHint();return;}
  const text=range.toString();range.deleteContents();range.insertNode(document.createTextNode(text));
  selA=selB=-1;
  try{getSelection().removeAllRanges();}catch(_){}
  sync();
}
/* 마크(형광펜) 풀기 */
function unwrapMark(mk){const p=mk.parentNode;if(!p)return;while(mk.firstChild)p.insertBefore(mk.firstChild,mk);p.removeChild(mk);p.normalize&&p.normalize();}
/* 전체 지우기 */
function clearAllHL(){editor.querySelectorAll('mark').forEach(unwrapMark);editor.normalize&&editor.normalize();selA=selB=-1;sync();}
function removeMarkByIndex(idx){const em=editor.querySelectorAll('mark');if(em[idx]){unwrapMark(em[idx]);editor.normalize&&editor.normalize();sync();}}
editor.addEventListener('click',e=>{const mk=e.target&&e.target.closest&&e.target.closest('mark');if(mk&&editor.contains(mk)&&getSelection().isCollapsed){const list=[...editor.querySelectorAll('mark')];const i=list.indexOf(mk);if(i>=0)removeMarkByIndex(i);}});
/* 미리보기: 칠해진 부분을 탭하면 그 형광펜 제거 — 오버레이 사각형 좌표로 판정 */
quoteTextEl.addEventListener('click',e=>{
  try{const s=getSelection();if(s&&s.rangeCount&&!s.getRangeAt(0).collapsed)return;}catch(_){}
  const canvas=document.getElementById('canvas');const scale=(canvas.getBoundingClientRect().width||curSize().w)/curSize().w;
  const base=quoteTextEl.getBoundingClientRect();
  const px=(e.clientX-base.left)/scale, py=(e.clientY-base.top)/scale;
  const fs=state.fontSize;const marks=quoteTextEl.querySelectorAll('mark');
  for(let idx=marks.length-1;idx>=0;idx--){
    const bands=markBands(marks[idx],base,scale,fs);
    for(let i=0;i<bands.length;i++){
      const B=bands[i];
      if(px>=B.left&&px<=B.left+B.width&&py>=B.top&&py<=B.top+B.height){removeMarkByIndex(idx);return;}
    }
  }
});
/* 누르는 즉시 실행 — click을 기다리지 않고, 누르는 순간의 선택을 잡아 바로 칠한다 */
function actHL(el, fn){
  let busy=false;
  const run=(e)=>{
    if(e.target && e.target.classList && e.target.classList.contains('x')) return;
    captureOffsets();
    e.preventDefault();
    if(busy) return; busy=true; setTimeout(()=>{busy=false;},350);
    fn();
  };
  el.addEventListener('mousedown',run);
  el.addEventListener('touchstart',run,{passive:false});
}
document.querySelectorAll('.hsw').forEach(b=>actHL(b,()=>applyHL(b.dataset.c)));
document.getElementById('hlClearAll').addEventListener('click',clearAllHL);
document.getElementById('hlCustom').addEventListener('input',e=>applyHL(e.target.value));
actHL(document.getElementById('hlSaveBtn'),()=>{const c=document.getElementById('hlCustom').value;if(!myHl.includes(c)){myHl.unshift(c);if(myHl.length>12)myHl.pop();saveLS(LS_HL,myHl);renderMyHl();}});
/* 선택 부분 굵게/기울임 (토글) — 형광펜처럼 부분 적용 */
function applyEmphasis(cmd){
  const range=getRange();
  if(!range){flashHint();return;}
  try{editor.focus({preventScroll:true});}catch(_){editor.focus();}
  try{const s=getSelection();s.removeAllRanges();s.addRange(range);}catch(_){return;}
  try{document.execCommand('styleWithCSS',false,false);}catch(_){}
  try{document.execCommand(cmd,false,null);}catch(_){}
  selA=selB=-1;
  try{getSelection().removeAllRanges();}catch(_){}
  sanitizeEditor();sync();
}
actHL(document.getElementById('emBold'),()=>applyEmphasis('bold'));
actHL(document.getElementById('emItalic'),()=>applyEmphasis('italic'));
function renderMyHl(){
  const row=document.getElementById('myHlRow');const wrap=document.getElementById('myHlWrap');wrap.innerHTML='';
  if(row)row.style.display=myHl.length?'block':'none';
  myHl.forEach((c,i)=>{
    const b=document.createElement('button');b.className='hsv';b.style.background=c;b.title=c;
    actHL(b,()=>applyHL(c));
    const x=document.createElement('button');x.className='x';x.textContent='×';
    ['mousedown','touchstart'].forEach(ev=>x.addEventListener(ev,e=>e.stopPropagation()));
    x.addEventListener('click',(e)=>{e.stopPropagation();myHl.splice(i,1);saveLS(LS_HL,myHl);renderMyHl();});
    b.appendChild(x);wrap.appendChild(b);
  });
}

function toggleQuotes(){
  const walker=document.createTreeWalker(editor,NodeFilter.SHOW_TEXT);const nodes=[];let n;while(n=walker.nextNode())nodes.push(n);
  if(!nodes.length)return;
  const full=nodes.map(x=>x.nodeValue).join('');
  const straight=/['"]/.test(full),curved=/[\u201c\u201d\u2018\u2019]/.test(full);
  if(curved){nodes.forEach(x=>{x.nodeValue=x.nodeValue.replace(/[\u201c\u201d]/g,'"').replace(/[\u2018\u2019]/g,"'");});}
  else if(straight){nodes.forEach(x=>{x.nodeValue=x.nodeValue.replace(/"([^"]*)"/g,'\u201c$1\u201d').replace(/'([^']*)'/g,'\u2018$1\u2019');});}
  else{nodes[0].nodeValue='\u201c'+nodes[0].nodeValue;nodes[nodes.length-1].nodeValue+='\u201d';}
  sync();
}

function toggleDark(){const d=document.body.classList.toggle('dark');document.getElementById('themeBtn').innerHTML=d?ICON_SUN:ICON_MOON;}
const SIZES={square:{w:1080,h:1080},portrait:{w:1080,h:1350},landscape:{w:1350,h:1000},twitter:{w:1500,h:500}};
function curSize(){return SIZES[state.sizeId]||SIZES.square;}
function setSize(id,btn){
  const s=SIZES[id];if(!s)return;
  state.sizeId=id;
  const cv=document.getElementById('canvas');
  cv.style.width=s.w+'px';cv.style.height=s.h+'px';
  const wrap=document.querySelector('.canvas-wrap');if(wrap)wrap.style.aspectRatio=s.w+' / '+s.h;
  document.querySelectorAll('#segSize button').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');
  scale();renderHL();saveSettings();
}
function scale(){const w=document.querySelector('.canvas-wrap'),c=document.getElementById('canvas');if(w&&c)c.style.transform='scale('+(w.getBoundingClientRect().width/curSize().w)+')';}

function shot(){const s=curSize();return html2canvas(document.getElementById('canvas'),{scale:1,useCORS:true,backgroundColor:null,width:s.w,height:s.h,onclone:d=>{d.getElementById('canvas').style.transform='scale(1)';}});}
function saveImg(){const b=document.getElementById('saveBtn'),o=b.textContent;b.textContent='생성 중…';b.disabled=true;shot().then(cv=>{const a=document.createElement('a');a.download='excerpt_'+Date.now()+'.png';a.href=cv.toDataURL('image/png');a.click();b.textContent=o;b.disabled=false;}).catch(()=>{alert('저장에 실패했어요. 다시 시도해 주세요.');b.textContent=o;b.disabled=false;});}
function copyImg(){const b=document.getElementById('copyBtn'),o=b.textContent;b.textContent='복사 중…';b.disabled=true;shot().then(cv=>{cv.toBlob(blob=>{if(!blob){alert('복사 중 문제가 생겼어요.');b.textContent=o;b.disabled=false;return;}try{navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(()=>{b.textContent='복사됨!';setTimeout(()=>{b.textContent=o;b.disabled=false;},1600);}).catch(()=>{alert('이 브라우저에서는 복사가 안 돼요. 이미지 저장을 이용해 주세요.');b.textContent=o;b.disabled=false;});}catch(e){alert('클립보드를 지원하지 않는 환경이에요. 이미지 저장을 이용해 주세요.');b.textContent=o;b.disabled=false;}},'image/png');}).catch(()=>{alert('복사에 실패했어요.');b.textContent=o;b.disabled=false;});}

document.getElementById('themeBtn').innerHTML=ICON_MOON;
loadSettings();
buildSwatches();renderMyBg();renderMyHl();restoreUI();applyTheme();applyStyle();render();
window.addEventListener('DOMContentLoaded',()=>{const w=document.querySelector('.canvas-wrap');if(w)new ResizeObserver(scale).observe(w);scale();});
try{document.fonts&&document.fonts.ready&&document.fonts.ready.then(()=>{renderHL();});}catch(_){}
window.addEventListener('load',()=>{renderHL();});
scale();
</script>
